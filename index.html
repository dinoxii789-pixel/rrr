<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>👑 ROV Shadow Notify</title>
</head>

<body style="background:#0b1a2a;color:white;text-align:center;padding:40px;">

<h1>👑 ROV Shadow Notify</h1>
<button onclick="start()">🔔 เริ่มแจ้งเตือน</button>

<h2 id="code">รอรับโค้ด...</h2>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

<!-- Socket -->
<script src="https://YOUR-RENDER.onrender.com/socket.io/socket.io.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAn4cZY0ManGoquSUsPMGited_RKpkFOy0",
  authDomain: "rrr-ba995.firebaseapp.com",
  projectId: "rrr-ba995",
  storageBucket: "rrr-ba995.firebasestorage.app",
  messagingSenderId: "99059515464",
  appId: "1:99059515464:web:ee07adebecac613271187d",
  measurementId: "G-DPSRZ5415C"
};

firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();

function start() {

  Notification.requestPermission().then(permission => {
    if (permission === "granted") {

      messaging.getToken().then(token => {
        console.log("TOKEN:", token);

        fetch("https://rrr-4d80.onrender.com/save-token", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({token})
        });

      });

    }
  });

  const socket = io("https://YOUR-RENDER.onrender.com");

  socket.on("newCode", code => {
    document.getElementById("code").innerText = code;

    new Notification("🔥 โค้ดใหม่!", { body: code });
  });
}
</script>

</body>
</html>
